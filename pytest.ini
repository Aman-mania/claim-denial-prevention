[pytest]
testpaths = tests
markers =
    unit: fast isolated tests
    integration: multi-module or pipeline tests
    slow: tests that train models, build indexes, or require heavy dependencies
    week1: Bronze ingestion tests
    week2: analytics/dashboard tests
    week3: Silver cleaning tests
    week4: Gold/ML/inference tests
    week5: explainability tests
    week6: RAG tests
addopts = -ra
