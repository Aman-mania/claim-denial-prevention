services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: claim-denial-api
    env_file:
      - .env.docker
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./models:/app/models
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

  product-ui:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    container_name: claim-denial-product-ui
    env_file:
      - .env.docker
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8501:8501"
    volumes:
      - ./data:/app/data:ro
      - ./models:/app/models:ro
      - ./logs:/app/logs
